{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
 --green-dark:#0b3d2e;
 --green:#145c41;
 --green-soft:#2f8f67;
 --sidebar-width:260px;
 --navbar-height:72px;
}
*{font-family:'Inter',sans-serif;}
body{margin:0;background:#fafdfb;overflow-x:hidden;}

.tech-bg{position:fixed;inset:0;z-index:-10;pointer-events:none;overflow:hidden;}
.tech-bg::before{
 content:"";position:absolute;inset:0;
 background:linear-gradient(135deg,#ffffff,#f5fff8,#eefaf3,#ffffff);
 background-size:400% 400%;
 animation:bgMove 18s ease infinite;
}
@keyframes bgMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

.tech-icon{
 position:absolute;
 color:var(--green-dark);
 opacity:.03;
 animation:pulse var(--dur) ease-in-out infinite;
 animation-delay:var(--delay);
}
@keyframes pulse{
 0%,100%{opacity:.02;filter:blur(3px);transform:scale(.9) rotate(0deg);}
 50%{opacity:.22;filter:blur(0);transform:scale(1.1) rotate(6deg);}
}

.top-navbar{
 position:fixed;top:0;left:0;right:0;height:72px;
 background:rgba(255,255,255,.9);
 backdrop-filter:blur(10px);
 display:flex;justify-content:space-between;align-items:center;
 padding:0 24px;z-index:1000;border-bottom:1px solid #eaeaea;
}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-icon{
 width:42px;height:42px;border-radius:12px;color:#fff;
 background:linear-gradient(135deg,var(--green-dark),var(--green));
 display:flex;align-items:center;justify-content:center;
}
.logo-text{font-weight:800;color:var(--green-dark);font-size:1.2rem;}

.sidebar{
 position:fixed;top:72px;left:0;width:260px;height:calc(100vh - 72px);
 background:linear-gradient(180deg,var(--green-dark),var(--green));
 padding:24px 16px;z-index:900;
}
.sidebar-link{
 display:flex;color:#fff;text-decoration:none;padding:14px 16px;
 border-radius:14px;margin-bottom:10px;transition:.3s;
}
.sidebar-link:hover{background:rgba(255,255,255,.12);transform:translateX(5px);}
.sidebar-link.active{
 background:#fff;color:var(--green-dark);font-weight:700;position:relative;overflow:hidden;
}
.sidebar-link.active:after{
 content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
 background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
 animation:shine 3s infinite;
}
@keyframes shine{100%{left:120%;}}

.user-area{display:flex;align-items:center;gap:12px;}
.user-avatar{
 width:40px;height:40px;border-radius:50%;color:#fff;
 background:linear-gradient(135deg,var(--green-dark),var(--green));
 display:flex;align-items:center;justify-content:center;font-weight:700;
}
.page-content{
 margin-left:260px;margin-top:72px;padding:40px;min-height:100vh;
}
@media(max-width:992px){
 .sidebar{width:80px}
 .page-content{margin-left:80px}
 .sidebar-link span,.logo-text{display:none}
}
</style>
</head>
